<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barang Masuk + Foto</title>
    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body{background:#f0f4f8; padding:15px;}
        .wadah{max-width:480px; margin:auto; background:white; border-radius:16px; padding:18px; box-shadow:0 2px 12px rgba(0,0,0,0.08);}

        .judul{background:#2e7d32; color:white; border-radius:12px; padding:14px; text-align:center; margin-bottom:15px; font-size:18px; font-weight:bold;}
        
        .kotak-isi{background:#f8f9fa; padding:12px; border-radius:8px; margin-bottom:12px;}
        input{width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:15px; margin:6px 0;}
        label{font-weight:500; font-size:14px;}

        .kotak-foto{border:2px dashed #2e7d32; border-radius:8px; padding:12px; text-align:center; margin:8px 0; min-height:120px;}
        #tampilFoto{max-width:100%; max-height:150px; border-radius:6px; margin-top:8px;}

        .tombol{padding:11px 14px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:15px; margin:4px 2px; width:48%;}
        .hijau{background:#2e7d32; color:white;}
        .biru{background:#165DFF; color:white;}

        .menu-bawah{margin-top:15px; text-align:center; padding-top:12px; border-top:1px solid #ddd;}
        .menu-bawah a{color:#165DFF; text-decoration:none; margin:0 6px; font-size:14px;}
    </style>
</head>
<body>
    <div class="wadah">

        <div class="judul">📸 BARANG MASUK + FOTO BARANG</div>


        <div class="kotak-isi">
            <label>📌 Kode Barang / Barcode</label>
            <input type="text" id="kodeBrg" placeholder="Contoh: 899123456789" required>

            <label>📦 Nama Barang</label>
            <input type="text" id="namaBrg" placeholder="Contoh: Indomie Goreng" required>

            <label>💲 Harga Satuan (Rp)</label>
            <input type="number" id="hargaBrg" placeholder="Contoh: 3500" required>

            <label>📦 Jumlah Stok Masuk</label>
            <input type="number" id="stokBrg" placeholder="Contoh: 50" value="1" required>


            <div class="kotak-foto">
                <label>📷 FOTO BARANG</label><br>
                <input type="file" id="ambilFoto" accept="image/*" capture="environment">
                <br>
                <img id="tampilFoto" src="" alt="Foto barang akan muncul disini">
            </div>


            <div style="text-align:center; margin-top:8px;">
                <button class="tombol hijau" onclick="simpanBarang()">💾 SIMPAN SEMUA</button>
                <button class="tombol biru" onclick="kosongkan()">🔄 KOSONGKAN</button>
            </div>
        </div>


        <div class="menu-bawah">
            <a href="index.html">🏠 Awal</a> |
            <a href="beranda.html">🏡 Beranda</a> |
            <a href="daftar-harga.html">📋 Daftar Stok</a> |
            <a href="barang-beli-pelanggan.html">🛒 Kasir</a>
        </div>

    </div>


<script>
let fotoBase64 = "";

// Baca foto yang diambil
document.getElementById("ambilFoto").addEventListener("change", function(e){
    let baca = new FileReader();
    baca.onload = function(acuan){
        fotoBase64 = acuan.target.result;
        document.getElementById("tampilFoto").src = fotoBase64;
    }
    baca.readAsDataURL(e.target.files[0]);
});


// Simpan barang lengkap DENGAN FOTO
function simpanBarang(){
    let kode = document.getElementById("kodeBrg").value.trim();
    let nama = document.getElementById("namaBrg").value.trim();
    let harga = parseInt(document.getElementById("hargaBrg").value);
    let stok = parseInt(document.getElementById("stokBrg").value);

    if(!kode || !nama || !harga || !fotoBase64){
        alert("❌ Lengkapi semua data & ambil foto dulu ya!");
        return;
    }

    // Ambil data lama
    let dataBarang = JSON.parse(localStorage.getItem("dataBarang")) || [];

    // Masukkan barang BARU lengkap
    dataBarang.push({
        kode: kode,
        nama: nama,
        harga: harga,
        stok: stok,
        foto: fotoBase64 // ⭐ FOTO DISIMPAN, NANTI MUNCUL OTOMATIS
    });

    // Simpan ke memori HP selamanya
    localStorage.setItem("dataBarang", JSON.stringify(dataBarang));

    alert("✅ BERHASIL DISIMPAN!\n\nData + Foto masuk lengkap.\nCek di DAFTAR STOK + HARGA, sudah ada otomatis!");
    kosongkan();
}


function kosongkan(){
    document.getElementById("kodeBrg").value = "";
    document.getElementById("namaBrg").value = "";
    document.getElementById("hargaBrg").value = "";
    document.getElementById("stokBrg").value = 1;
    document.getElementById("ambilFoto").value = "";
    document.getElementById("tampilFoto").src = "";
    fotoBase64 = "";
}

</script>

</body>
</html>
