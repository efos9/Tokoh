<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barang Masuk + Foto</title>
    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body{background:#f0f4f8; padding:20px;}
        .wadah{max-width:450px; margin:auto; background:white; border-radius:16px; padding:25px; box-shadow:0 2px 12px rgba(0,0,0,0.08);}
        h1{text-align:center; color:#2e7d32; margin-bottom:20px; font-size:20px;}
        .kotak-isi{display:flex; flex-direction:column; gap:12px; margin-bottom:18px;}
        input{padding:13px; border:1px solid #ddd; border-radius:8px; font-size:15px;}
        button{padding:13px; border:none; border-radius:8px; font-weight:bold; font-size:16px; cursor:pointer;}
        .hijau{background:#2e7d32; color:white;}
        .biru{background:#165DFF; color:white;}
        .pesan{padding:10px; border-radius:8px; margin:10px 0; display:none; text-align:center;}
        .menu-bawah{margin-top:20px; text-align:center; padding-top:15px; border-top:1px solid #ddd;}
        .menu-bawah a{color:#165DFF; text-decoration:none; margin:0 5px; font-size:14px;}
    </style>
</head>
<body>
    <div class="wadah">
        <h1>📸 BARANG MASUK + FOTO</h1>

        <div class="pesan" id="pesanSukses" style="background:#e6f9e9; color:#2e7d32;">✅ Barang Tersimpan!</div>
        <div class="pesan" id="pesanGagal" style="background:#ffe9e9; color:#d32f2f;">❌ Lengkapi Semua / Kode Sudah Ada!</div>

        <div class="kotak-isi">
            <input type="text" id="kodeBarang" placeholder="Kode Barcode / Kode Barang">
            <input type="text" id="namaBarang" placeholder="Nama Barang">
            <input type="number" id="hargaBarang" placeholder="Harga Satuan (Rp)">
            <input type="number" id="stokBarang" placeholder="Jumlah Stok Masuk">
            <input type="file" id="fotoBarang" accept="image/*">

            <button class="hijau" onclick="simpanBarang()">✅ SIMPAN BARANG</button>
        </div>

        <!-- ✅ MENU NYAMBUNG -->
        <div class="menu-bawah">
            <a href="index.html">🏠 Awal</a> |
            <a href="login.html">🔑 Login</a> |
            <a href="branda.html">🏡 Beranda</a> |
            <a href="barang-beli-pelanggan.html">🛒 Kasir</a> |
            <a href="daftar.html">📋 Daftar Barang</a>
        </div>
    </div>

<script>
function simpanBarang(){
    let kode = document.getElementById("kodeBarang").value.trim();
    let nama = document.getElementById("namaBarang").value.trim();
    let harga = parseInt(document.getElementById("hargaBarang").value) || 0;
    let stok = parseInt(document.getElementById("stokBarang").value) || 0;

    if(!kode || !nama || harga<1 || stok<1) return gagal();

    let daftar = JSON.parse(localStorage.getItem("dataBarang")) || [];
    if(daftar.find(b=>b.kode===kode)) return gagal("❌ Kode barang SUDAH ADA! Pakai kode lain.");

    // ✅ SIMPAN SELAMANYA, NANTI KETIKA DI SCAN LANGSUNG MUNCUL SENDIRI
    daftar.push({kode, nama, harga, stok});
    localStorage.setItem("dataBarang", JSON.stringify(daftar));

    sukses();
    // Bersihkan kolom
    ["kodeBarang","namaBarang","hargaBarang","stokBarang"].map(id=>document.getElementById(id).value="");
}

function gagal(teks="Lengkapi SEMUA data barang"){
    let el = document.getElementById("pesanGagal");
    el.innerText=teks; el.style.display="block"; setTimeout(()=>el.style.display="none",3000);
}
function sukses(){
    let el = document.getElementById("pesanSukses");
    el.style.display="block"; setTimeout(()=>el.style.display="none",2500);
}
</script>

</body>
</html>
