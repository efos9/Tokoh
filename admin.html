<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Admin - WAERUA INDOMARET</title>
    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body{background:#f0f4f8; padding:15px;}
        .wadah{max-width:480px; margin:auto; background:white; border-radius:16px; padding:18px; box-shadow:0 2px 12px rgba(0,0,0,0.08);}

        .judul{background:#2e7d32; color:white; border-radius:12px; padding:14px; text-align:center; margin-bottom:15px; font-size:18px; font-weight:bold;}
        .catatan{background:#fff3cd; border-left:4px solid #ffc107; padding:10px; border-radius:8px; margin-bottom:15px; font-size:14px;}

        .menu-admin{display:flex; flex-direction:column; gap:10px; margin:15px 0;}
        .tombol-menu{padding:14px; border:none; border-radius:10px; font-weight:bold; font-size:15px; cursor:pointer; text-align:left; display:flex; align-items:center; gap:8px; color:white;}
        .biru{background:#165DFF;}
        .hijau{background:#2e7d32;}
        .ungu{background:#7928ca;}
        .merah{background:#dc3545;}
        .abu{background:#6c757d;}

        .kotak-info{background:#e6f0fc; border-radius:10px; padding:12px; margin:10px 0;}
        .baris-info{display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed #ccc;}
        .baris-info:last-child{border:none;}

        .menu-bawah{margin-top:15px; text-align:center; padding-top:12px; border-top:1px solid #ddd;}
        .menu-bawah a{color:#165DFF; text-decoration:none; margin:0 6px; font-size:14px;}
    </style>
</head>
<body>
    <div class="wadah">

        <div class="judul">⚙️ HALAMAN ADMIN • PENGATURAN SISTEM</div>

        <div class="catatan">
            ⚠️ <strong>Hanya untuk Pemilik / Admin!</strong><br>
            Halaman ini berisi pengaturan penting, ubah data dengan hati-hati.
        </div>


        <div class="kotak-info">
            <div class="baris-info">
                <span>🏪 Nama Toko</span>
                <span><strong>WAERUA INDOMARET</strong></span>
            </div>
            <div class="baris-info">
                <span>📍 Alamat</span>
                <span>Jalan Raya Wae Rua</span>
            </div>
            <div class="baris-info">
                <span>👤 Pengguna Aktif</span>
                <span id="namaAdmin">Efronaldus</span>
            </div>
            <div class="baris-info">
                <span>📅 Tanggal</span>
                <span id="tanggalSekarang"></span>
            </div>
        </div>


        <div class="menu-admin">
            <button class="tombol-menu biru" onclick="keHalaman('buat-akun.html')">👤 TAMBAH PENGGUNA / KASIR BARU</button>
            <button class="tombol-menu hijau" onclick="keHalaman('barang-masuk.html')">📦 KELOLA BARANG / STOK MASUK</button>
            <button class="tombol-menu hijau" onclick="keHalaman('daftar-harga.html')">📋 UBAH HARGA & DAFTAR BARANG</button>
            <button class="tombol-menu ungu" onclick="keHalaman('laporan-penjualan.html')">📊 LAPORAN PENJUALAN / LABA RUGI</button>
            <button class="tombol-menu abu" onclick="keHalaman('pengaturan-toko.html')">⚙️ SETING NAMA TOKO / CETAK NOTA</button>
            <button class="tombol-menu merah" onclick="hapusSemuaData()">🗑️ KOSONGKAN SEMUA DATA (RESET)</button>
        </div>


        <div class="menu-bawah">
            <a href="index.html">🏠 Awal</a> |
            <a href="beranda.html">🏡 Beranda</a> |
            <a href="profil.html">👤 Profil</a> |
            <a href="barang-beli-pelanggan.html">🛒 Kasir</a> |
            <a href="login.html">🔑 Keluar</a>
        </div>

    </div>


<script>
// ✅ Cek login, kalau belum masuk ke login
let dataAkun = JSON.parse(localStorage.getItem("penggunaAktif"));
if(!dataAkun) {
    location.href = "login.html";
} else {
    document.getElementById("namaAdmin").innerText = dataAkun.namaLengkap || "Efronaldus";
}

// ✅ Tampilkan tanggal hari ini
let hari = new Date();
let formatTanggal = hari.getDate() + " / " + (hari.getMonth()+1) + " / " + hari.getFullYear();
document.getElementById("tanggalSekarang").innerText = formatTanggal;


// ✅ Fungsi pindah halaman
function keHalaman(tujuan){
    location.href = tujuan;
}


// ✅ Fungsi hapus data (harus konfirmasi 2 kali)
function hapusSemuaData(){
    if(confirm("⚠️ PERINGATAN KERAS!\nSemua barang, harga, akun, laporan akan HILANG PERMANEN! Tidak bisa dikembalikan lagi!\n\nYakin mau lanjut?")){
        if(confirm("❌ TERAKHIR: Anda BENAR-BENAR YAKIN? Ini tindakan tidak bisa dibatalkan!")){
            localStorage.clear();
            alert("✅ Semua data sudah dihapus. Aplikasi kembali ke awal.");
            location.href = "login.html";
        }
    }
}
</script>

</body>
</html>
