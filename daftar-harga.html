<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Stok + Harga + Foto</title>
    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body{background:#f0f4f8; padding:15px;}
        .wadah{max-width:480px; margin:auto; background:white; border-radius:16px; padding:18px; box-shadow:0 2px 12px rgba(0,0,0,0.08);}

        .judul{background:#165DFF; color:white; border-radius:12px; padding:14px; text-align:center; margin-bottom:15px; font-size:18px; font-weight:bold;}
        
        .kotak-cari{background:#f8f9fa; padding:12px; border-radius:8px; margin-bottom:12px;}
        input{width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:15px;}

        /* ✅ BENTUK TABEL RAPI */
        table{width:100%; border-collapse: collapse; margin-top:8px;}
        table th{background:#165DFF; color:white; padding:10px; text-align:center; font-size:14px; border:1px solid #ddd;}
        table td{border:1px solid #ddd; padding:8px; text-align:center; font-size:13px; background:#fdfdfd; vertical-align: middle;}
        .foto-tabel{width:50px; height:50px; object-fit:cover; border-radius:4px;}
        .stok-habis{color:#dc3545; font-weight:bold;}
        .stok-sedikit{color:#ff9800; font-weight:bold;}
        .stok-banyak{color:#2e7d32; font-weight:bold;}

        .kosong{text-align:center; color:#888; padding:40px 10px;}

        .menu-bawah{margin-top:15px; text-align:center; padding-top:12px; border-top:1px solid #ddd;}
        .menu-bawah a{color:#165DFF; text-decoration:none; margin:0 6px; font-size:14px;}
    </style>
</head>
<body>
    <div class="wadah">

        <div class="judul">📋 DAFTAR STOK + HARGA + FOTO</div>

        <!-- ✅ Kolom Cari Barang -->
        <div class="kotak-cari">
            <input type="text" id="cariBarang" placeholder="🔍 Cari kode / nama barang..." oninput="cariDaftar()">
        </div>


        <!-- ✅ TABEL LENGKAP: Nomor | Foto | Kode | Nama | Harga | Stok -->
        <div id="wadahTabel">
            <p class="kosong">⚠️ Belum ada barang masuk.<br>Masukkan dulu di menu <b>BARANG MASUK + FOTO</b></p>
        </div>


        <!-- ✅ MENU NAVIGASI -->
        <div class="menu-bawah">
            <a href="index.html">🏠 Awal</a> |
            <a href="beranda.html">🏡 Beranda</a> |
            <a href="barang-masuk.html">📸 Masuk Barang</a> |
            <a href="barang-beli-pelanggan.html">🛒 Kasir</a> |
            <a href="barang-keluar.html">📤 Keluar Barang</a>
        </div>

    </div>


<script>
// Ambil SEMUA barang yang kamu simpan (termasuk foto)
let dataBarang = JSON.parse(localStorage.getItem("dataBarang")) || [];

// Tampilkan saat buka
tampilkanDaftar(dataBarang);


function tampilkanDaftar(dataTampil){
    let wadah = document.getElementById("wadahTabel");
    wadah.innerHTML = "";

    if(dataTampil.length === 0){
        wadah.innerHTML = `<p class="kosong">⚠️ Belum ada barang masuk.<br>Masukkan dulu di menu <b>BARANG MASUK + FOTO</b></p>`;
        return;
    }

    // ✅ BUAT TABEL RAPI SESUAI KEMAUANMU
    let tabel = document.createElement("table");
    tabel.innerHTML = `
    <thead>
        <tr>
            <th>No</th>
            <th>FOTO</th>
            <th>KODE</th>
            <th>NAMA BARANG</th>
            <th>HARGA (Rp)</th>
            <th>STOK</th>
        </tr>
    </thead>
    <tbody id="isiTabel"></tbody>
    `;

    let isi = tabel.querySelector("#isiTabel");

    // ✅ Isi data satu-satu, ada nomor urut 1,2,3 dst
    dataTampil.forEach((brg, urutan) => {
        // Warna tulisan stok biar jelas
        let warnaStok = "stok-banyak";
        if(brg.stok === 0) warnaStok = "stok-habis";
        else if(brg.stok < 5) warnaStok = "stok-sedikit";

        isi.innerHTML += `
        <tr>
            <td>${urutan+1}</td>
            <td><img src="${brg.foto}" class="foto-tabel"></td>
            <td><b>${brg.kode}</b></td>
            <td style="text-align:left; padding:0 6px;">${brg.nama}</td>
            <td>${brg.harga.toLocaleString('id-ID')}</td>
            <td class="${warnaStok}">${brg.stok}</td>
        </tr>
        `;
    });

    wadah.appendChild(tabel);
}


// ✅ Fungsi Cari Barang
function cariDaftar(){
    let kataKunci = document.getElementById("cariBarang").value.trim().toLowerCase();
    let hasil = dataBarang.filter(brg => 
        brg.nama.toLowerCase().includes(kataKunci) || 
        brg.kode.toLowerCase().includes(kataKunci)
    );
    tampilkanDaftar(hasil);
}

</script>

</body>
</html>
