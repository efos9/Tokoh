<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Stok + Harga + Foto</title>
    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body{background:#f0f4f8; padding:15px;}
        .wadah{max-width:480px; margin:auto; background:white; border-radius:16px; padding:18px; box-shadow:0 2px 12px rgba(0,0,0,0.08);}

        .judul{background:#165DFF; color:white; border-radius:12px; padding:14px; text-align:center; margin-bottom:15px; font-size:18px; font-weight:bold;}
        
        .kotak-cari{background:#f8f9fa; padding:12px; border-radius:8px; margin-bottom:12px;}
        input{width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:15px;}

        .kartu-barang{border:1px solid #ddd; border-radius:8px; padding:10px; margin:8px 0; display:flex; gap:10px; align-items:center; background:#fdfdfd;}
        .foto-kecil{width:70px; height:70px; object-fit:cover; border-radius:6px; border:1px solid #ccc;}
        .isi{flex:1;}
        .isi b{font-size:15px; color:#165DFF;}
        .isi p{font-size:13px; margin:2px 0;}

        .kosong{text-align:center; color:#888; padding:40px 10px;}

        .menu-bawah{margin-top:15px; text-align:center; padding-top:12px; border-top:1px solid #ddd;}
        .menu-bawah a{color:#165DFF; text-decoration:none; margin:0 6px; font-size:14px;}
    </style>
</head>
<body>
    <div class="wadah">

        <div class="judul">📋 DAFTAR STOK + HARGA + FOTO</div
