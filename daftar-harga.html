<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Stok + Harga</title>
    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body{background:#f0f4f8; padding:15px;}
        .wadah{max-width:480px; margin:auto; background:white; border-radius:16px; padding:18px; box-shadow:0 2px 12px rgba(0,0,0,0.08);}

        .judul{background:#165DFF; color:white; border-radius:12px; padding:14px; text-align:center; margin-bottom:15px; font-size:18px; font-weight:bold;}
        .info-jumlah{background:#e6f0fc; padding:12px; border-radius:8px; text-align:center; font-size:17px; font-weight:bold; color:#165DFF; margin-bottom:12px;}
        
        .kotak-cari{background:#f8f9fa; padding:12px; border-radius:8px; margin-bottom:12px;}
        input{width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:15px;}

        table{width:100%; border-collapse:collapse; margin-top:8px;}
        table th{background:#165DFF; color:white; padding:10px; text-align:left; font-size:14px;}
        table td{border:1px solid #ddd; padding:10px; font-size:14px; background:#fdfdfd;}
        .stok-habis{color:#dc3545; font-weight:bold;}
        .stok-sedikit{color:#ff9800; font-weight:bold;}
        .stok-banyak{color:#2e7d32; font-weight:bold;}

        .kosong{text-align:center; color:#888; padding:30px 10px;}

        .tombol{padding:8px 12px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; font-size:13px;}
        .merah{background:#dc3545; color:white;}

        .menu-bawah{margin-top:15px; text-align:center; padding-top:12px; border-top:1px solid #ddd;}
        .menu-bawah a{color:#165DFF; text-decoration:none; margin:0 6px; font-size:14px;}
    </style>
</head>
<body>
    <div class="wadah">

        <div class="judul">📋 DAFTAR STOK + HARGA BARANG</div>

        <div class="info-jumlah">
            📦 JUMLAH JENIS BARANG : <span id="jumlahJenis">0</span> | 📊 TOTAL SEMUA STOK : <span id="jumlahSemua">0</span>
        </div>


        <!-- ✅ KOLOM CARI BARANG -->
        <div class="kotak-cari">
            <input type="text" id="cariBarang" placeholder="🔍 Cari nama / kode barang..." oninput="cariDaftar()">
        </div>


        <!-- ✅ TABEL DAFTAR STOK LENGKAP -->
        <div id="wadahTabel">
            <p class="kosong">⚠️ Belum ada barang masuk. Masukkan dulu di menu <b>BARANG MASUK + FOTO</b></p>
        </div>


        <!-- ✅ MENU NYAMBUNG -->
        <div class="menu-bawah">
            <a href="index.html">🏠 Awal</a> |
            <a href="beranda.html">🏡 Beranda</a> |
            <a href="barang-masuk.html">📸 Masuk Barang</a> |
            <a href="barang-keluar.html">📤 Barang Keluar</a> |
            <a href="barang-beli-pelanggan.html">🛒 Kasir</a>
        </div>

    </div>


<script>
// Ambil semua data barang yang sudah disimpan
let dataBarang = JSON.parse(localStorage.getItem("dataBarang")) || [];

// Tampilkan semua daftar saat buka
tampilkanDaftar(dataBarang);


function tampilkanDaftar(dataTampil){
    let wadah = document.getElementById("wadahTabel");
    wadah.innerHTML = "";

    // Hitung jumlah total
    let totalJenis = dataTampil.length;
    let totalStok = 0;
    dataTampil.forEach(b => totalStok += b.stok);

    document.getElementById("jumlahJenis").innerText = totalJenis;
    document.getElementById("jumlahSemua").innerText = totalStok;


    if(dataTampil.length === 0){
        wadah.innerHTML = `<p class="kosong">⚠️ Belum ada barang masuk. Masukkan dulu di menu <b>BARANG MASUK + FOTO</b></p>`;
        return;
    }


    // Buat tabel lengkap
    let tabel = document.createElement("table");
    tabel.innerHTML = `
    <thead>
        <tr>
            <th>KODE</th>
            <th>NAMA BARANG</th>
            <th>HARGA (Rp)</th>
            <th>STOK</th>
            <th>AKSI</th>
        </tr>
    </thead>
    <tbody id="isiTabel"></tbody>
    `;

    let isi = tabel.querySelector("#isiTabel");

    dataTampil.forEach((brg, indeks) => {
        // Warna stok
        let kelasStok = "stok-banyak";
        if(brg.stok === 0) kelasStok = "stok-habis";
        else if(brg.stok < 5) kelasStok = "stok-sedikit";

        isi.innerHTML += `
        <tr>
            <td>${brg.kode}</td>
            <td><b>${brg.nama}</b></td>
            <td>${brg.harga.toLocaleString('id-ID')}</td>
            <td class="${kelasStok}">${brg.stok}</td>
            <td><button class="tombol merah" onclick="hapusBarang(${indeks})">🗑️ Hapus</button></td>
        </tr>
        `;
    });

    wadah.appendChild(tabel);
}


// ✅ FUNGSI CARI BARANG
function cariDaftar(){
    let kataKunci = document.getElementById("cariBarang").value.trim().toLowerCase();
    let hasil = dataBarang.filter(brg => brg.nama.toLowerCase().includes(kataKunci) || brg.kode.toLowerCase().includes(kataKunci));
    tampilkanDaftar(hasil);
}


// ✅ FUNGSI HAPUS BARANG
function hapusBarang(urutan){
    if(confirm("❌ Yakin mau hapus barang ini? Tidak bisa dikembalikan!")){
        dataBarang.splice(urutan,1);
        localStorage.setItem("dataBarang", JSON.stringify(dataBarang));
        tampilkanDaftar(dataBarang);
    }
}

</script>

</body>
</html>
