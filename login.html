<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Akun</title>
    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body{background:#f0f4f8; padding:20px;}
        .wadah{max-width:420px; margin:auto; background:white; border-radius:16px; padding:25px; box-shadow:0 2px 12px rgba(0,0,0,0.08);}
        h1{text-align:center; color:#2e7d32; margin-bottom:22px; font-size:20px;}
        .kotak-isi{display:flex; flex-direction:column; gap:14px; margin-bottom:20px;}
        input{padding:14px 16px; border:1px solid #dde2e8; border-radius:10px; font-size:15px;}
        .tombol-hijau{background:#2e7d32; color:white; border:none; padding:14px; border-radius:10px; font-weight:bold; font-size:16px; cursor:pointer;}
        .pesan{padding:10px; border-radius:8px; margin-bottom:12px; display:none; text-align:center; color:white;}
        .merah{background:#d32f2f;}
        .hijau{background:#2e7d32;}
        .navigasi{margin-top:18px; text-align:center; padding-top:16px; border-top:1px solid #eee;}
        .navigasi a{color:#165DFF; text-decoration:none; margin:0 6px; font-weight:500;}
    </style>
</head>
<body>
    <div class="wadah">
        <h1>🔐 LOGIN AKUN</h1>
        <div class="pesan merah" id="pesanGagal">❌ Nama pengguna / Sandi SALAH!</div>
        <div class="pesan hijau" id="pesanSukses">✅ Berhasil Masuk... Pindah ke Beranda</div>

        <div class="kotak-isi">
            <input type="text" id="userLogin" placeholder="Nama Pengguna">
            <input type="password" id="sandiLogin" placeholder="Kata Sandi">
            <button class="tombol-hijau" onclick="cekLogin()">➡️ MASUK / LOGIN</button>
        </div>

        <div class="navigasi">
            <a href="index.html">🏠 Halaman Awal</a> |
            <a href="buat-akun.html">📝 Buat Akun Baru</a>
        </div>
    </div>

<script>
function cekLogin(){
    let user = document.getElementById("userLogin").value.trim();
    let sandi = document.getElementById("sandiLogin").value.trim();
    let data = JSON.parse(localStorage.getItem("dataPengguna")) || [];

    let ketemu = data.find(akun => akun.username === user && akun.sandi === sandi);
    if(ketemu){
        localStorage.setItem("penggunaAktif", JSON.stringify(ketemu));
        document.getElementById("pesanSukses").style.display = "block";
        // ✅ ALAMAT SUDAH DIPERBAIKI, PASTI KETEMU
        setTimeout(()=>{ window.location.href = "beranda.html"; },1200);
    }else{
        document.getElementById("pesanGagal").style.display = "block";
    }
}
</script>
</body>
</html>
