<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir - Scan Barcode</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body{background:#f0f4f8; padding:15px;}
        .wadah{max-width:480px; margin:auto; background:white; border-radius:16px; padding:18px; box-shadow:0 2px 12px rgba(0,0,0,0.08);}

        .kotak-biru{background:#165DFF; color:white; border-radius:12px; padding:14px; text-align:center; margin-bottom:15px;}
        .kotak-pindai{border:2px dashed #165DFF; border-radius:12px; padding:20px; text-align:center; margin-bottom:15px;}
        #pemindai{width:100%; height:240px; border-radius:8px; overflow:hidden; background:#f8f9fa;}

        .barang-temu{background:#e6f9e9; border-left:4px solid #2e7d32; padding:12px; border-radius:8px; margin-bottom:12px; display:none;}
        .kolom{display:flex; gap:8px; margin:8px 0;}
        input{flex:1; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:15px;}

        .total{background:#f1f4f9; padding:12px; border-radius:8px; text-align:right; font-size:20px; font-weight:bold; color:#165DFF; margin:10px 0;}
        .kembalian{background:#fff3cd; padding:10px; border-radius:8px; text-align:center; font-weight:bold; font-size:16px; color:#d38000; margin:8px 0;}

        .barang-daftar{border:1px solid #eee; border-radius:8px; padding:10px; margin:12px 0; min-height:60px;}

        .tombol{padding:11px 14px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:15px;}
        .hijau{background:#2e7d32; color:white;}
        .biru{background:#165DFF; color:white;}
        .merah{background:#dc3545; color:white;}

        .menu-bawah{margin-top:15px; text-align:center; padding-top:12px; border-top:1px solid #ddd;}
        .menu-bawah a{color:#165DFF; text-decoration:none; margin:0 6px; font-size:14px;}

        /* ✅ AREA CETAK - BISA DIPAKAI BERKALI-KALI */
        .cetak-kotak{display:none; padding:15px; background:white; font-family:monospace; font-size:14px; line-height:1.5; border:1px solid #ccc; width:300px; margin:auto;}
        @media print{ body{background:white;} .wadah, .menu-bawah{display:none;} .cetak-kotak{display:block; border:none;} }
    </style>
</head>

            <p>Sama Indomaret • Langsung Baca • Cetak Bisa Berkali-kali ✅</p>

        </div>
